<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard NOC Service Desk</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>


<body>

<header>

<img src="assets/logo.png" class="logo">

<div>

<h1>Service Desk Dashboard</h1>
<p>Grupo Conexão</p>

</div>

</header>



<!-- KPIs -->

<section class="kpis">

<div class="card">
<h3>Total Chamados</h3>
<p id="totalChamados">0</p>
</div>

<div class="card">
<h3>Backlog</h3>
<p id="backlog">0</p>
</div>

<div class="card">
<h3>MTTR</h3>
<p id="mttr">0h</p>
</div>

<div class="card">
<h3>MTTA</h3>
<p id="mtta">0h</p>
</div>

<div class="card">
<h3>Pico de Chamados</h3>
<p id="picoChamados">0</p>
</div>

</section>



<!-- GRÁFICOS PRINCIPAIS -->

<section class="charts">

<div class="panel">
<h3>Chamados por Status</h3>
<canvas id="statusChart"></canvas>
</div>


<div class="panel">
<h3>Chamados por Prioridade</h3>
<canvas id="prioridadeChart"></canvas>
</div>


<div class="panel">
<h3>Ranking de Técnicos</h3>
<canvas id="tecnicosChart"></canvas>
</div>


<div class="panel">
<h3>Tendência de Incidentes</h3>
<canvas id="mesChart"></canvas>
</div>

</section>



<!-- GRÁFICOS OPERACIONAIS -->

<section class="charts">

<div class="panel">
<h3>Aging de Backlog</h3>
<canvas id="agingChart"></canvas>
</div>


<div class="panel">
<h3>Chamados por Hora do Dia</h3>
<canvas id="heatmapHora"></canvas>
</div>

</section>



<!-- RODAPÉ -->

<footer>

<p>Dashboard de Gestão de TI • Grupo Conexão</p>

</footer>


<script src="app.js"></script>

</body>
</html>
