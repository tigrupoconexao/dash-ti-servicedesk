<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOC Service Desk Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

</head>

<body>

<header>

<img src="assets/logo.png" class="logo">

<div>

<h1>Service Desk NOC</h1>
<p>Grupo Conexão</p>

</div>

</header>


<section class="kpis">

<div class="card">

<h3>Total Chamados</h3>

<p id="totalChamados">0</p>

</div>


<div class="card">

<h3>Backlog</h3>

<p id="backlog">0</p>

</div>


<div class="card">

<h3>MTTR</h3>

<p id="mttr">0h</p>

</div>


<div class="card">

<h3>SLA Médio</h3>

<p id="sla">0%</p>

</div>

</section>


<section class="charts">

<div class="panel">

<h3>Chamados por Status</h3>

<canvas id="statusChart"></canvas>

</div>

<div class="panel">

<h3>Chamados por Prioridade</h3>

<canvas id="prioridadeChart"></canvas>

</div>

<div class="panel">

<h3>Chamados por Mês</h3>

<canvas id="mesChart"></canvas>

</div>

<div class="panel">

<h3>Ranking de Técnicos</h3>

<canvas id="tecnicosChart"></canvas>

</div>

</section>


<section class="heatmaps">

<div class="panel">

<h3>Heatmap Semanal</h3>

<div id="heatmapSemanal"></div>

</div>

<div class="panel">

<h3>Heatmap Mensal</h3>

<div id="heatmapMensal"></div>

</div>

</section>


<script src="app.js"></script>

</body>
</html>
