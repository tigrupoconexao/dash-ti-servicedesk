<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Gestão de TI</title>

<link rel="stylesheet" href="./style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

</head>

<body>

<header class="topbar">

<img src="./assets/logo.png" class="logo">

<div>
<h1>Dashboard Gestão de TI</h1>
<p>Grupo Conexão</p>
</div>

</header>


<section class="filters">

<select id="statusFilter"></select>
<select id="tipoFilter"></select>
<select id="dominioFilter"></select>

<input type="date" id="dataInicio">
<input type="date" id="dataFim">

<button onclick="applyFilters()">Aplicar</button>

</section>


<section class="kpis">

<div class="kpi">
<h3>Total Chamados</h3>
<p id="kpiTotal">0</p>
</div>

<div class="kpi">
<h3>Concluídos</h3>
<p id="kpiResolvidos">0</p>
</div>

<div class="kpi">
<h3>Abertos</h3>
<p id="kpiAbertos">0</p>
</div>

<div class="kpi">
<h3>% Conclusão</h3>
<p id="kpiTaxa">0%</p>
</div>

</section>


<section class="grid">

<div class="panel">
<canvas id="statusChart"></canvas>
</div>

<div class="panel">
<canvas id="prioridadeChart"></canvas>
</div>

<div class="panel">
<canvas id="tipoChart"></canvas>
</div>

<div class="panel">
<canvas id="dominioChart"></canvas>
</div>

<div class="panel">
<canvas id="mesChart"></canvas>
</div>

</section>


<section class="heatmaps">

<div class="panel">
<h3>Heatmap Semanal</h3>
<div id="heatmapSemanal"></div>
</div>

<div class="panel">
<h3>Heatmap Mensal</h3>
<div id="heatmapMensal"></div>
</div>

</section>

<script src="./app.js"></script>

</body>
</html>
